<!DOCTYPE html>
<html>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.5; color: #111; padding: 24px;">
    <h2 style="margin: 0 0 12px;">Confirm your email</h2>
    <p style="margin: 0 0 16px; color: #444;">
      Click the link below to finish setting up your Fluent Fast account.
    </p>
    <p style="margin: 0 0 24px;">
      <a
        href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=signup&next=/courses"
        style="display: inline-block; padding: 10px 16px; background: #111; color: #fff; text-decoration: none; border-radius: 6px;"
      >
        Confirm email
      </a>
    </p>
    <p style="margin: 0; font-size: 12px; color: #888;">
      If you didn't create an account, you can ignore this email.
    </p>
  </body>
</html>
